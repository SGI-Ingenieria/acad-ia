name: 'backup-database'
on:
  push:
    branches: ['main']
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v2
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # - name: Backup roles
      #   run: supabase db dump -f supabase/roles.sql --role-only
      # - name: Backup schema
      #   run: supabase db dump -f supabase/schema.sql
      - name: Backup data
        run: supabase db dump -f supabase/seed.sql --data-only
      - name: Generar tipos de Supabase
        run: |
          supabase gen types typescript --schema public > supabase/functions/_shared/database.types.ts
          cp supabase/functions/_shared/database.types.ts src/types/supabase.ts
      - name: Check for changes
        id: git_status
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITEA_OUTPUT
          else
            echo "changed=false" >> $GITEA_OUTPUT
          fi

      - name: Commit changes
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git config user.name "supabot"
          git config user.email "info.ingenieria@lasalle.mx"
          git add supabase/seed.sql
          git add supabase/functions/_shared/database.types.ts
          git commit -m "chore: update database seed & typescript types"

      - name: Push changes
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git pull
          git push
