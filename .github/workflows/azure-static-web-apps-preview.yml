name: Azure Static Web Apps Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: preview

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase development project
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy database migrations to development
        run: |
          supabase db push --debug --yes --include-seed

      - name: Deploy Supabase Edge Functions to development
        run: |
          supabase functions deploy

      - name: Push secrets to development project
        run: |
          supabase secrets set \
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            CARBONE_API_TOKEN=${{ secrets.CARBONE_API_TOKEN }} \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Install dependencies
        run: bun install

      - name: Build app
        run: bunx --bun vite build

      - name: Deploy Azure Static Web Apps preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true
