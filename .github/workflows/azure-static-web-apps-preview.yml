name: Azure Static Web Apps Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

jobs:
  build_and_deploy_preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy Preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Supabase Preview
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: supabase_check
        with:
          checkName: Supabase Preview
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if Supabase Preview failed
        if: steps.supabase_check.outputs.conclusion == 'failure'
        run: |
          echo "Supabase Preview failed"
          exit 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve Supabase preview env
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ROOT_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GIT_BRANCH_NAME: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Git branch: $GIT_BRANCH_NAME"

          supabase branches get "$GIT_BRANCH_NAME" \
            --project-ref "$ROOT_PROJECT_REF" \
            -o json > branch.json

          echo "Supabase branch payload:"
          cat branch.json

          # 1. Extraer URL y Anon Key directamente del nuevo formato JSON
          PREVIEW_URL=$(jq -r '.SUPABASE_URL // empty' branch.json)
          PUBLISHABLE_KEY=$(jq -r '.SUPABASE_ANON_KEY // empty' branch.json)

          if [ -z "$PREVIEW_URL" ] || [ -z "$PUBLISHABLE_KEY" ]; then
            echo "Error: No se pudo extraer SUPABASE_URL o SUPABASE_ANON_KEY del payload"
            exit 1
          fi

          # 2. Derivar el Project Ref extrayéndolo de la URL (por si lo necesitas)
          PREVIEW_PROJECT_REF=$(echo "$PREVIEW_URL" | sed -e 's|^https://||' -e 's|\.supabase\.co$||')
          echo "Preview project ref: $PREVIEW_PROJECT_REF"

          # 3. Inyectar variables de entorno para Vite
          echo "VITE_SUPABASE_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$PUBLISHABLE_KEY" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bunx --bun vite build

      - name: Copy SWA config
        run: |
          if [ -f staticwebapp.config.json ]; then
            cp staticwebapp.config.json dist/staticwebapp.config.json
          fi

      - name: Deploy prebuilt app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Preview
    environment: preview

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          action: close
