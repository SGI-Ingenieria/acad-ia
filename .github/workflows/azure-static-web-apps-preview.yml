name: Azure Static Web Apps Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Supabase Preview
        id: supabase_check
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          checkName: Supabase Preview
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop if Supabase Preview failed
        if: steps.supabase_check.outputs.conclusion != 'success'
        run: exit 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve Supabase preview env
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ROOT_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GIT_BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          DATA="$(supabase branches get "$GIT_BRANCH_NAME" --project-ref "$ROOT_PROJECT_REF" -o json)"
          echo "VITE_SUPABASE_URL=$(jq -r '.SUPABASE_URL' <<< "$DATA")" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$(jq -r '.SUPABASE_ANON_KEY' <<< "$DATA")" >> "$GITHUB_ENV"
          echo "PREVIEW_PROJECT_REF=$(jq -r '.project_ref // .PROJECT_REF // empty' <<< "$DATA")" >> "$GITHUB_ENV"
          
      - name: Push secrets to preview branch
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run:
          supabase secrets set
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          CARBONE_API_TOKEN=${{ secrets.CARBONE_API_TOKEN }}
          --project-ref "$PREVIEW_PROJECT_REF"

      - run: bun install
      - run: bunx --bun vite build

      - name: Deploy prebuilt app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true
